name: SDK Python

on:
  push:
    branches: [main, master]
    paths:
      - "sdk-python/**"
      - "runtime/arcflow-core/**"
      - "Cargo.toml"
      - ".github/workflows/sdk-python.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "sdk-python/**"
      - "runtime/arcflow-core/**"
      - "Cargo.toml"
      - ".github/workflows/sdk-python.yml"

jobs:
  sdk-python:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Create virtualenv
        working-directory: sdk-python
        shell: bash
        run: python -m venv .venv
      - name: Install tools
        working-directory: sdk-python
        shell: bash
        run: |
          if [ -f ".venv/bin/activate" ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          python -m pip install --upgrade pip
          pip install maturin pytest "mypy<1.19" black ruff
      - name: Build wheel
        working-directory: sdk-python
        shell: bash
        run: |
          if [ -f ".venv/bin/activate" ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          maturin build --release --out dist
      - name: Install built package
        working-directory: sdk-python
        shell: bash
        run: |
          if [ -f ".venv/bin/activate" ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          pip install dist/arcflow-*.whl
      - name: Ruff
        working-directory: sdk-python
        shell: bash
        run: |
          if [ -f ".venv/bin/activate" ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          ruff check arcflow tests
      - name: Black
        working-directory: sdk-python
        shell: bash
        run: |
          if [ -f ".venv/bin/activate" ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          black --check arcflow tests
      - name: Mypy
        working-directory: sdk-python
        shell: bash
        run: |
          if [ -f ".venv/bin/activate" ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          mypy arcflow
      - name: Pytest
        working-directory: sdk-python
        shell: bash
        run: |
          if [ -f ".venv/bin/activate" ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          # Run from a temp dir so local `sdk-python/arcflow/` doesn't shadow the installed wheel.
          tmpdir="$(mktemp -d 2>/dev/null || python -c \"import tempfile; print(tempfile.mkdtemp())\")"
          cd "$tmpdir"
          pytest "$GITHUB_WORKSPACE/sdk-python/tests" -v
