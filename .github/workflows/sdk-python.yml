name: SDK Python

on:
  pull_request:
    branches: [development, master]
    paths: &sdk_paths
      - "sdk-python/**"
      - "runtime/arcflow-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/sdk-python.yml"
  workflow_dispatch:

concurrency:
  group: sdk-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk-python-fast:
    name: Fast (Ubuntu, Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: sdk-python-fast
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tools and dev extension
        working-directory: sdk-python
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install maturin pytest "mypy<1.19" black ruff pytest-httpserver
          python -m maturin develop
      - name: Ruff
        working-directory: sdk-python
        shell: bash
        run: python -m ruff check arcflow tests
      - name: Black
        working-directory: sdk-python
        shell: bash
        run: python -m black --check arcflow tests
      - name: Mypy
        working-directory: sdk-python
        shell: bash
        run: python -m mypy arcflow
      - name: Pytest
        working-directory: sdk-python
        shell: bash
        env:
          PYTHONPATH: ""
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python -m pytest "$GITHUB_WORKSPACE/sdk-python/tests" -v
