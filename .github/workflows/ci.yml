name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit

  commit-size:
    name: Commit size (max 100 code lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce per-commit code line limit
        run: bash scripts/check-commit-size.sh

  validate-contracts:
    name: Validate RCS schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Compile RCS JSON Schema (draft-07)
        run: bash scripts/validate-rcs-schema.sh

  function-length:
    name: Function length check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder (Sprint 2 enforces max 50 lines)
        run: echo "Function length enforcement active from Sprint 2"

  structure-check:
    name: Directory structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required directories
        run: |
          for dir in runtime/arcflow-core sdk-python sdk-typescript sdk-java sdk-go cli contracts; do
            test -d "$dir" || (echo "Missing required directory: $dir" && exit 1)
          done
          if [ -d docs ]; then echo "Note: local docs/ may exist but must not be tracked by git"; fi
