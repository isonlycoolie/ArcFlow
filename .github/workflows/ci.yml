name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --check

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: cargo test --workspace

  trace-performance:
    name: Trace overhead budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Bench trace emit path
        run: |
          cargo bench -p arcflow-core --bench trace_overhead -- --noplot 2>&1 | tee /tmp/bench.txt
          python3 scripts/assert_trace_overhead.py < /tmp/bench.txt

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: cargo install cargo-audit
      - run: cargo audit

  commit-size:
    name: Commit size (max 100 code lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce per-commit code line limit
        run: bash scripts/check-commit-size.sh

  secrets-scan:
    name: Secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block obvious hardcoded secrets
        run: |
          set -euo pipefail
          # Exit 0 from git grep means matches were found.
          if git grep -nE 'sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}' -- . ':(exclude)target' ':(exclude).git' 2>/dev/null; then
            echo "::error::Possible API key or AWS access key id pattern in tree"
            exit 1
          fi
          if git grep -nE 'BEGIN (RSA|OPENSSH|EC) PRIVATE KEY' -- . ':(exclude)target' ':(exclude).git' 2>/dev/null; then
            echo "::error::Possible PEM private key material in tree"
            exit 1
          fi
          echo "OK: no blocked secret-like patterns"

  validate-contracts:
    name: Validate RCS schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Compile RCS JSON Schema (draft-07)
        run: bash scripts/validate-rcs-schema.sh

  no-unwrap:
    name: No unwrap in library code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject unwrap and expect outside tests
        run: bash scripts/check-no-unwrap.sh

  no-sql-interpolation:
    name: No SQL string interpolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject dynamic SQL in memory backends
        run: bash scripts/check-no-sql-interpolation.sh

  function-length:
    name: Function length check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce max 40 lines per function
        run: bash scripts/check-function-length.sh

  doc:
    name: Rustdoc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build docs without warnings
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  structure-check:
    name: Directory structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required directories
        run: |
          for dir in runtime/arcflow-core sdk-python sdk-typescript sdk-java sdk-go cli contracts; do
            test -d "$dir" || (echo "Missing required directory: $dir" && exit 1)
          done
          if [ -d docs ]; then echo "Note: local docs/ may exist but must not be tracked by git"; fi

  provider-security-audit:
    name: Provider credential scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/assert_provider_no_credentials.py

  typescript-build:
    name: TypeScript SDK build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cargo build -p arcflow-node
      - working-directory: sdk-typescript
        run: |
          npm install
          npm run build:ts
          npm test
