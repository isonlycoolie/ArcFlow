name: Integration Memory

on:
  pull_request:
    branches: [development, master]
    paths:
      - "runtime/arcflow-core/**"
      - "sdk-python/**"
      - "docker/**"
      - ".github/workflows/integration-memory.yml"
  workflow_dispatch:

concurrency:
  group: integration-memory-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory-backends:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arcflow
          POSTGRES_PASSWORD: arcflow
          POSTGRES_DB: arcflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arcflow -d arcflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/readyz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ARCFLOW_POSTGRESQL_URL: postgresql://arcflow:arcflow@localhost:5432/arcflow
      ARCFLOW_QDRANT_URL: http://localhost:6334
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run in-process memory tests
        run: cargo test -p arcflow-core sprint4_memory -- --test-threads=1
      - name: Run Docker-backed memory tests
        run: cargo test -p arcflow-core sprint4_memory -- --ignored --test-threads=1
      - name: Run Sprint 4 tool workflow test
        run: cargo test -p arcflow-core sprint4_tools
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run SDK persistent memory integration test
        shell: bash
        working-directory: sdk-python
        env:
          PYTHONPATH: ""
        run: |
          set -euo pipefail
          python -m pip install -q maturin pytest
          python -m maturin develop
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python -m pytest "$GITHUB_WORKSPACE/sdk-python/tests/integration/test_memory_workflow.py::test_persistent_memory_survives_new_workflow_run" -v
