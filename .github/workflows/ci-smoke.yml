name: CI smoke

on:
  pull_request:
    branches: [development, master]
  workflow_dispatch:

concurrency:
  group: ci-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: CI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fast gates (no Rust compile)
        run: bash scripts/ci-smoke.sh
