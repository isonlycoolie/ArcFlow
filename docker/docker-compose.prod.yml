# Production-like stack: Postgres, Qdrant, migrate job, server, relay.
# Usage: docker compose -f docker/docker-compose.prod.yml up --build
# Set ARCFLOW_SERVER_API_KEY and ARCFLOW_ADMIN_API_KEY in your shell or a .env file.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arcflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-"<set-your-postgres-password>"}
      POSTGRES_DB: ${POSTGRES_DB:-arcflow}
    volumes:
      - arcflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcflow -d arcflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - arcflow_qdrant_data:/qdrant/storage

  arcflow-migrate:
    build:
      context: ..
      dockerfile: server/arcflow-server/Dockerfile.migrate
    environment:
      ARCFLOW_POSTGRESQL_URL: ${ARCFLOW_POSTGRESQL_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  arcflow-server:
    build:
      context: ..
      dockerfile: server/arcflow-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ARCFLOW_SERVER_API_KEY: ${ARCFLOW_SERVER_API_KEY:-"<set-your-server-api-key>"}
      ARCFLOW_ADMIN_API_KEY: ${ARCFLOW_ADMIN_API_KEY:-"<set-your-admin-api-key>"}
      ARCFLOW_DEFAULT_UPSTREAM_RUNTIME_KEY: ${ARCFLOW_DEFAULT_UPSTREAM_RUNTIME_KEY:-"<set-your-default-runtime-key>"}
      ARCFLOW_POSTGRESQL_URL: ${ARCFLOW_POSTGRESQL_URL}
      ARCFLOW_QDRANT_URL: ${ARCFLOW_QDRANT_URL:-http://qdrant:6333}
      ARCFLOW_EMBEDDING_PROVIDER: ${ARCFLOW_EMBEDDING_PROVIDER:-openai/text-embedding-3-small}
      ARCFLOW_PORT: "8080"
      ARCFLOW_PG_MAX_CONNECTIONS: "10"
    depends_on:
      postgres:
        condition: service_healthy
      arcflow-migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started

  arcflow-relay:
    build:
      context: ..
      dockerfile: server/arcflow-relay/Dockerfile
    ports:
      - "8090:8090"
    environment:
      ARCFLOW_UPSTREAM_URL: http://arcflow-server:8080
      ARCFLOW_POSTGRESQL_URL: postgres://arcflow:arcflow@postgres:5432/arcflow
      ARCFLOW_RELAY_PORT: "8090"
    depends_on:
      arcflow-server:
        condition: service_started

volumes:
  arcflow_pg_data:
  arcflow_qdrant_data:
