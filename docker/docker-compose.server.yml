services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arcflow
      POSTGRES_PASSWORD: arcflow
      POSTGRES_DB: arcflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcflow -d arcflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  arcflow-server:
    build:
      context: ..
      dockerfile: server/arcflow-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ARCFLOW_SERVER_API_KEY: dev-secret
      ARCFLOW_POSTGRESQL_URL: postgres://arcflow:arcflow@postgres:5432/arcflow
      ARCFLOW_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  static-demo:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ../examples/static/online-application-chatbot:/usr/share/nginx/html:ro
    depends_on:
      - arcflow-server
